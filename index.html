<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Year 7 Space Explorer</title>
<link rel="stylesheet" href="css/styles.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <header id="topbar">
    <h1>Space Explorer</h1>
    <nav id="scene-tabs">
      <button data-scene="solar" class="active">Solar System</button>
      <button data-scene="stars">Stars</button>
      <button data-scene="remnants">Stellar Remnants</button>
      <button data-scene="galaxies">Galaxies</button>
      <button data-scene="constellations">Constellations</button>
    </nav>
  </header>

  <main>
    <div id="canvas-container"></div>

    <aside id="info-panel" class="hidden">
      <button id="close-info" aria-label="Close">×</button>
      <h2 id="info-title">—</h2>
      <p id="info-type" class="type-tag"></p>
      <p id="info-caption"></p>
      <ul id="info-facts"></ul>
    </aside>

    <div id="scene-controls">
      <div id="scale-toggle" class="hidden">
        <label>
          <span>Scale: <strong id="scale-label">Illustrative</strong></span>
          <input type="range" id="scale-slider" min="0" max="100" value="0" />
        </label>
        <p class="hint">Slide right toward true scale — watch what happens to the planets!</p>
      </div>
      <div id="scene-hint"></div>
    </div>
  </main>

  <footer id="bottom-hint">
    <span>🖱 Drag to rotate · Scroll to zoom · Click an object for info</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
