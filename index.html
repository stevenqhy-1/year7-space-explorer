<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Year 7 Space Explorer</title>
<link rel="stylesheet" href="css/styles.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <header id="topbar">
    <h1>Space Explorer</h1>
    <nav id="scene-tabs">
      <button data-scene="solar" class="active">Solar System</button>
      <button data-scene="stars">Stars</button>
      <button data-scene="remnants">Stellar Remnants</button>
      <button data-scene="galaxies">Galaxies</button>
      <button data-scene="constellations">Constellations</button>
      <button data-scene="celestial">Celestial Bodies</button>
      <button data-scene="gallery">Gallery</button>
    </nav>
  </header>

  <main>
    <aside id="sidebar">
      <h3 id="sidebar-title">Objects</h3>
      <ul id="object-list"></ul>
      <button id="reset-view" class="reset-btn">⟲ Reset view</button>
    </aside>

    <div id="canvas-container"></div>
    <div id="stars2d-container" class="hidden"></div>
    <button id="stars2d-prev" class="stars2d-arrow hidden" aria-label="Previous panel">‹</button>
    <button id="stars2d-next" class="stars2d-arrow hidden" aria-label="Next panel">›</button>
    <div id="celestial-container" class="hidden"></div>
    <div id="gallery-container" class="hidden"></div>

    <aside id="info-panel" class="hidden">
      <button id="close-info" aria-label="Close">×</button>
      <h2 id="info-title">—</h2>
      <p id="info-type" class="type-tag"></p>
      <p id="info-caption"></p>
      <ul id="info-facts"></ul>
    </aside>

    <div id="scene-controls">
      <div id="scale-toggle" class="hidden">
        <label>
          <span>Scale: <strong id="scale-label">Illustrative</strong></span>
          <input type="range" id="scale-slider" min="0" max="100" value="0" />
        </label>
        <p class="hint">Slide right toward true scale — watch what happens to the planets!</p>
      </div>
      <div id="scene-hint"></div>
    </div>

    <div id="time-controls" class="hidden">
      <div class="time-readout">
        <span class="time-icon">📅</span>
        <strong id="virtual-date">—</strong>
        <button id="real-now-btn" title="Snap to today's real positions">Today</button>
      </div>
      <div class="time-speeds">
        <button class="time-speed-btn" data-rate="0" title="Pause">⏸</button>
        <button class="time-speed-btn" data-rate="3600" title="1 hour per second">1 hr/s</button>
        <button class="time-speed-btn" data-rate="86400" title="1 day per second">1 day/s</button>
        <button class="time-speed-btn active" data-rate="604800" title="1 week per second">1 wk/s</button>
        <button class="time-speed-btn" data-rate="2592000" title="1 month per second">1 mo/s</button>
        <button class="time-speed-btn" data-rate="31536000" title="1 year per second">1 yr/s</button>
        <button class="time-speed-btn" data-rate="315360000" title="10 years per second">10 yr/s</button>
      </div>
    </div>
  </main>

  <div id="formation-caption" class="hidden">
    <span class="formation-step" id="formation-step">Step 1 of 5</span>
    <span id="formation-text"></span>
  </div>

  <footer id="bottom-hint">
    <span>🖱 Drag to rotate · Scroll to zoom · Click an object (or its name in the sidebar) for a close-up</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
